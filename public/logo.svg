<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#FED7AA;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" ry="112" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="4"/>
  <!-- Audio waveform bars - premium minimal style -->
  <g transform="translate(256, 256)">
    <!-- Bar 1 -->
    <rect x="-140" y="-40" width="32" height="80" rx="16" fill="url(#waveGrad)"/>
    <!-- Bar 2 -->
    <rect x="-88" y="-80" width="32" height="160" rx="16" fill="url(#waveGrad)"/>
    <!-- Bar 3 (center, tallest) -->
    <rect x="-36" y="-110" width="32" height="220" rx="16" fill="white"/>
    <!-- Bar 4 -->
    <rect x="16" y="-90" width="32" height="180" rx="16" fill="url(#waveGrad)"/>
    <!-- Bar 5 -->
    <rect x="68" y="-60" width="32" height="120" rx="16" fill="url(#waveGrad)"/>
    <!-- Bar 6 -->
    <rect x="120" y="-35" width="32" height="70" rx="16" fill="url(#waveGrad)"/>
  </g>
</svg>